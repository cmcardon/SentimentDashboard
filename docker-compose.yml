version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentiment_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-sentiment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentiment}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace

volumes:
  postgres_data:

